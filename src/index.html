<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spendify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Monoton&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>


  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand site-logo" href="#">Spendify</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
          <li class="nav-item"><a id="products-link" class="nav-link" href="#products">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="#order-section">Order</a></li>
        </ul>
      </div>
    </div>
  </nav>


  <section class="hero-section text-center">
    <div class="container">
      <h1 class="site-logo display-hero">Spendify</h1>
      <p class="site-tagline">Spend it your way</p>
    </div>
  </section>

  <div class="container">

    <script>

      // Load items when the "Products" link is clicked
      let loadItemsBtn = document.getElementById("products-link");
      loadItemsBtn.addEventListener("click", loadItems);


      // Function to load items from the API
      function loadItems() {
        fetch('https://dummyjson.com/products')
          .then(responce => responce.json())
          .then(jsonData => renderItems(jsonData))
          .catch(error => console.error("Error loading items:", error));
      }

      // Function to render items in the DOM
      function renderItems(data) {
        let output = '';
        let item = document.getElementById("items-container");

        data.products.forEach((product) => {

          console.log(product);
          output += `
                          <div class="col mb-4">
                                <div class="card" style="width: 18rem;">
                                <img src="${product.images[0]}" class="card-img-top" alt="${product.title}">
                                 <div class="card-body">
                                     ${product.brand ? `<h5 class="card-brand">${product.brand}</h5>` : ""}
                                     <h1 class="card-title"> ${product.title}</h2>
                                     <p class="card-text">${product.description}</p>
                                     <p class="card-text text-danger"> Price: ${product.price}</p>
                                     <a href="#" class="filter-btn">Buy</a>
                                </div>
                            </div>
                        </div>
                        
                        `;
        });
        item.innerHTML = output;
      }


    </script>

      
    <div class="product-view">
      <div class="container text-left">
        <div id="items-container" class="row row-cols-4" />
      </div>
    </div>

  </div>

  <footer>
    <div class="footer-content text-center">
      <p>&copy; 2026 Spendify. All rights reserved.</p>
    </div>
    
  </footer>

</body>
