<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spendify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Monoton&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>


  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand site-logo" href="#">Spendify</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
          <li class="nav-item"><a id="products-link" class="nav-link" href="#products">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="#order-section">Order</a></li>
        </ul>
      </div>
    </div>
  </nav>


  <section class="hero-section text-center">
    <div class="container">
      <h1 class="site-logo display-hero">Spendify</h1>
      <p class="site-tagline">Spend it your way</p>
    </div>
  </section>

  <div class="container">  
    <div class="product-view">
      <div class="container text-left">
        <div id="items-container" class="row" />
      </div>
    </div>

  </div>
 
  <div class="modal fade" id="orderModal" tabindex="-1" aria-labelledby="orderModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content order-modal-content">
 
        <div class="modal-header">
          <h5 class="modal-title section-title" id="orderModalLabel">Place your order</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
 
          <div id="modalProductPreview" class="modal-product-preview d-none mb-3">
            <img id="previewImg" src="" alt="" />
            <div>
              <p id="previewTitle" class="preview-title"></p>
              <p id="previewPrice" class="preview-price"></p>
            </div>
          </div>

          <form id="orderForm" novalidate>
 
            <fieldset class="order-fieldset mb-3">
              <legend>Personal details</legend>
              <div class="field-group">
                <label for="fName">Name *</label>
                <input type="text" id="fName" placeholder="Niklas Niklasson" maxlength="50" />

                <span class="error" id="errName"></span>
              </div>
              <div class="field-group">
                <label for="fEmail">Email *</label>
                <input type="email" id="fEmail" placeholder="niklas@example.com" maxlength="50" />
                <span class="error" id="errEmail"></span>
              </div>
              <div class="field-group">
                <label for="fPhone">Phone *</label>
                <input type="tel" id="fPhone" placeholder="070-123 45 67" maxlength="20" />
                <span class="error" id="errPhone"></span>
              </div>
            </fieldset>
 
            <fieldset class="order-fieldset mb-3">
              <legend>Delivery address</legend>
              <div class="field-group">
                <label for="fStreet">Street address *</label>
                <input type="text" id="fStreet" placeholder="Gatugatan 1" maxlength="50" />
                <span class="error" id="errStreet"></span>
              </div>
              <div class="field-row">
                <div class="field-group">
                  <label for="fZip">Postcode *</label>
                  <input type="text" id="fZip" placeholder="12345" maxlength="5" />
                  <span class="error" id="errZip"></span>
                </div>
                <div class="field-group">
                  <label for="fCity">City *</label>
                  <input type="text" id="fCity" placeholder="Stockholm" maxlength="20" />
                  <span class="error" id="errCity"></span>
                </div>
              </div>
            </fieldset>
 
            <button type="submit" class="btn-submit w-100">Place order</button>
          </form>

          <div id="confirmBox" class="confirm-box text-center d-none">
            <div class="confirm-check mx-auto mb-3">✓</div>
            <h3>Order received!</h3>
            <p id="confirmText"></p>
            <button class="btn-submit w-100" id="confirmClose">Back to shop</button>
          </div>
 
        </div>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-content text-center">
      <p class="small text" > &copy; 2026 Spendify. All rights reserved.</p>
    </div>
  </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
